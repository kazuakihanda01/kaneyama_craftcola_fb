<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>クラフトコーラ 試飲アンケート</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="forest-bg"></div>
  <div class="bubble bubble-1"></div>
  <div class="bubble bubble-2"></div>
  <div class="bubble bubble-3"></div>

  <main class="app">
    <section class="hero">
      <div class="mascot-card">
        <img src="misugichan.png" alt="美杉ちゃん" class="misugi" onerror="this.style.display='none'; document.querySelector('.mascot-fallback').style.display='grid';" />
        <div class="mascot-fallback">美杉ちゃん<br><span>画像を入れてね</span></div>
      </div>

      <div class="hero-copy">
        <p class="label">KANEYAMA CRAFT COLA</p>
        <h1>クラフトコーラ<br>試飲アンケート</h1>
        <p class="lead">飲んで、笑って、みんなで育てる。</p>
      </div>

      <div class="bottle">
        <div class="bottle-neck"></div>
        <div class="bottle-body">
          <span>杉</span>
          <strong>COLA</strong>
          <small>試作品</small>
        </div>
      </div>
    </section>

    <section class="tabs">
      <button class="tab active" data-tab="survey">回答する</button>
      <button class="tab" data-tab="admin">統計・CSV</button>
    </section>

    <section id="surveyPanel" class="panel active-panel">
      <form id="surveyForm" class="survey-card">

  <div class="question">
    <label for="name">① お名前（ニックネーム可）</label>
    <input id="name" type="text" placeholder="お名前" />
  </div>

  <div class="question star-question">
    <h2>② 今の総合評価</h2>
    <p>星をタップしてください</p>

    <div class="stars" id="stars">
      <button type="button" data-value="1">★</button>
      <button type="button" data-value="2">★</button>
      <button type="button" data-value="3">★</button>
      <button type="button" data-value="4">★</button>
      <button type="button" data-value="5">★</button>
    </div>

    <input type="hidden" id="rating" required />
  </div>

  <div class="question">
    <label for="better">
      ③ もっと美味しくするために必要なことは？
    </label>

    <textarea
      id="better"
      placeholder="甘さ・香り・杉感・スパイス感・後味など"
    ></textarea>
  </div>

  <div class="question">
    <label for="useCase">
      ④ どんな応用ができそうか？
    </label>

    <textarea
      id="useCase"
      placeholder="ソーダ、アルコール割り、アイス、観光体験、ギフトなど"
    ></textarea>
  </div>

  <div class="question">
    <label for="freeComment">
      ⑤ 自由意見
    </label>

    <textarea
      id="freeComment"
      placeholder="感想・アイデア・期待など"
    ></textarea>
  </div>

  <div class="actions">
    <button type="submit" class="primary">
      フィードバックを送る
    </button>

    <button type="reset" class="secondary">
      クリア
    </button>
  </div>

  <p id="saveMessage" class="message"></p>

</form>
    </section>

    <section id="adminPanel" class="panel">
      <div class="admin-card">
        <h2>統計照会・CSVダウンロード</h2>
        <p class="hint">管理用パスコードを入力すると、Supabaseから全回答を取得します。</p>

        <div class="admin-login">
          <input id="adminPass" type="password" placeholder="管理用パスコード" />
          <button id="loadAdmin" class="primary" type="button">集計を表示</button>
        </div>

        <p id="adminMessage" class="message"></p>

        <div id="statsArea" class="stats hidden">
          <div class="stat-grid">
            <div class="stat-box">
              <span>回答数</span>
              <strong id="countStat">0</strong>
            </div>
            <div class="stat-box">
              <span>平均評価</span>
              <strong id="avgStat">0.0</strong>
            </div>
            <div class="stat-box">
              <span>最高評価</span>
              <strong id="maxStat">0</strong>
            </div>
          </div>

          <div class="chart-card">
            <h3>⭐評価分布</h3>
            <div id="ratingBars"></div>
          </div>

          <div class="chart-card">
            <h3>味の評価</h3>
            <div id="tasteBars"></div>
          </div>

          <div class="chart-card">
            <h3>売れるか？</h3>
            <div id="sellBars"></div>
          </div>

          <div class="actions">
            <button id="downloadCsv" class="primary" type="button">全件CSVダウンロード</button>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>日時</th>
                  <th>⭐</th>
                  <th>飲みたいか</th>
                  <th>味</th>
                  <th>売れるか</th>
                  <th>自由意見</th>
                </tr>
              </thead>
              <tbody id="answerRows"></tbody>
            </table>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
